<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>6.1</title>
    <style>
        a:link {
            color: purple;
        }
        a:visited {
            color: green;
        }
        a:hover {
            color: red;
            background-color: yellow;
        }
        a:active {
            color: white;
            background-color: black;
        }

        .container::before {
            content: "Ссылки на сайты ВУЗов Барнаула";
            display: block;
            border: 1px solid purple;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
        }
        .container::after {
            content: "";
            display: block;
            border-bottom: 1px solid purple;
            margin-top: 20px;
        }

        .link-block {
            border-radius: 50%;
            align-content: center;
            text-align: center;
            border: 3px solid purple;
            height: 200px;
            margin: 10px;
            font-size: 20px;
            display: inline-block;
            width: 200px;
        }

        .container {
            text-align: center;
            padding: 20px;
        }
    </style>
<base target="_blank">
</head>
<body>

    <div class="container">
        <div class="link-block">
            <a href="https://www.altstu.ru" target="_blank">АлтГТУ</a>
        </div>
        <div class="link-block">
            <a href="https://www.asu.ru" target="_blank">АГУ</a>
        </div>
        <div class="link-block">
            <a href="https://asmu.ru/" target="_blank">АГМУ</a>
        </div>
        <div class="link-block">
            <a href="https://www.agik22.ru/" target="_blank">АГИК</a>
        </div>
    </div>

</body>
</html>

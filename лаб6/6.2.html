<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6.2</title>
    <style>

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 100px 200px 100px;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .block {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .block1 {
            background: #4a90d9;
            grid-column: 1 / 3;
        }

        .block2 {
            background: #f5a623;
            grid-column: 1;

        }

        .block3 {
            background: #d0021b;
            grid-column: 1;
            grid-row: 2;
        }

        .block4 {
            background: #7ed321;
            grid-column: 2;
            grid-row: 2;
        }

        .block5 {
            background: #9013fe;
            grid-column: 3;
            grid-row: 1 / 3;
        }

        .block6 {
            background: #50e3c2;
            grid-column: 2 / 4;
            grid-row: 3;
        }

        .block7 {
            background: rgba(255, 0, 0, 0.5);
            grid-column: 3/4;
            grid-row: 1/4;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="block block1">1</div>
        <div class="block block2">2</div>
        <div class="block block3">3</div>
        <div class="block block4">4</div>
        <div class="block block5">5</div>
        <div class="block block6">6</div>
        <div class="block block7">7</div>
    </div>
</body>
</html>

<html>
<head>
    <meta charset="UTF-8">
<base target="_blank">
<style type="text/css">
    body {
    background-color: #008b8b;
    margin: 0;
    padding: 20px;
}

#wrap {
    width: 500px;
    height: 350px;
    border: 2px solid black;
    margin: 0 auto;
    position: relative;
    background-color: #008b8b;
}

#red {
    background-image: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%);
    width: 80px;
    height: 60px;
    border: 2px solid black;
    position: absolute;
    top: 30px;
    left: 40px;
}

#blue {
    background-image: linear-gradient(to right, #43e97b 0%, #38f9d7 100%);
    width: 80px;
    height: 150px;
    border: 2px solid black;
    position: absolute;
    top: 110px;
    left: 40px;
}

#green {
    background-image: linear-gradient(to top, #fdcbf1 0%, #fdcbf1 1%, #e6dee9 100%);
    width: 220px;
    height: 150px;
    border: 2px solid black;
    position: absolute;
    top: 30px;
    left: 150px;
}

#yellow {
    background-image: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%);
    width: 220px;
    height: 60px;
    border: 2px solid black;
    position: absolute;
    top: 200px;
    left: 150px;
}
</style>
</head>
<body>
    <div id="wrap">
        <div id="red"></div>
        <div id="blue"></div>
        <div id="green"></div>
        <div id="yellow"></div>
    </div>
</body>
</html>

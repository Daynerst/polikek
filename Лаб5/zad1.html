<html>
<head>
    <meta charset="UTF-8">
<base target="_blank">
<style type='text/css'>
body {
    background-color: #008b8b;
    margin: 0;
    padding: 20px;
}

#wrap {
    width: 500px;
    height: 350px;
    border: 2px solid black;
    margin: 0 auto;
    position: relative;
    background-color: #008b8b;
}

#red {
    background-color: red;
    width: 80px;
    height: 60px;
    border: 2px solid black;
    position: absolute;
    top: 30px;
    left: 40px;
}

#blue {
    background-color: blue;
    width: 80px;
    height: 150px;
    border: 2px solid black;
    position: absolute;
    top: 110px;
    left: 40px;
}

#green {
    background-color: green;
    width: 220px;
    height: 150px;
    border: 2px solid black;
    position: absolute;
    top: 30px;
    left: 150px;
}

#yellow {
    background-color: yellow;
    width: 220px;
    height: 60px;
    border: 2px solid black;
    position: absolute;
    top: 200px;
    left: 150px;
}
</style>
</head>
<body>
    <div id="wrap">
        <div id="red"></div>
        <div id="blue"></div>
        <div id="green"></div>
        <div id="yellow"></div>
    </div>
</body>
</html>
